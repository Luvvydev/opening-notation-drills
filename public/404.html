<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ChessDrills</title>
    <script>
      (function () {
        var pathSegmentsToKeep = 0;
        var l = window.location;
        var base = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/';
        var route = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~');
        var search = l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '';
        var target = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + base + '?p=/' + route + search + l.hash;

        l.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
